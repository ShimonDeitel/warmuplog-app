name: WarmUpLog
options:
  bundleIdPrefix: com.shimondeitel.warmuplog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  WarmUpLog:
    type: application
    platform: iOS
    sources:
      - path: WarmUpLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warmuplog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: WarmUpLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WarmUpLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WarmUpLogTests
      - path: WarmUpLog.storekit
    dependencies:
      - target: WarmUpLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warmuplog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WarmUpLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WarmUpLogUITests
    dependencies:
      - target: WarmUpLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.warmuplog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  WarmUpLog:
    build:
      targets:
        WarmUpLog: all
        WarmUpLogTests: [test]
        WarmUpLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: WarmUpLog.storekit
    test:
      config: Debug
      storeKitConfiguration: WarmUpLog.storekit
      targets:
        - WarmUpLogTests
        - WarmUpLogUITests
    archive:
      config: Release
